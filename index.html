<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エチケット袋コレクション</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">

<!-- ヘッダー -->

<header class="bg-white shadow-md">
  <div class="max-w-6xl mx-auto p-8 text-center">
    <h1 class="text-4xl font-bold mb-3">✈️ エチケット袋コレクション</h1>
    <p class="text-gray-600">世界の航空会社のエチケット袋を紹介しています</p>
  </div>
</header>

<!-- メイン -->

<main class="max-w-6xl mx-auto p-6">

  <!-- ヒーロー -->

  <section class="text-center mt-8">
    <p class="text-lg text-gray-700 mb-6">
      世界中の航空会社で配布されているエチケット袋を収集・紹介するコレクションサイトです。
    </p>

<a href="collection.html"
   class="inline-block px-8 py-4 bg-blue-500 text-white text-lg rounded-xl shadow hover:bg-blue-600 transition">
   コレクションを見る
</a>

  </section>

  <!-- 地域リンク -->

  <section class="mt-14">
    <h2 class="text-2xl font-semibold text-center mb-6">地域別コレクション</h2>

<div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">

  <a href="collection.html"
     class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
     🌏<br>すべて
  </a>

  <a href="collection.html?region=Japan"
     class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
     🇯🇵<br>日本
  </a>

  <a href="collection.html?region=China"
     class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
     🇨🇳<br>中国
  </a>

  <a href="collection.html?region=East Asia"
     class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
     🌏<br>東アジア
  </a>

</div>

  </section>

  <!-- サイト説明 -->

  <section class="mt-16 text-center max-w-2xl mx-auto">
    <h2 class="text-2xl font-semibold mb-4">このサイトについて</h2>

<p class="text-gray-600 leading-relaxed">
  航空機の座席ポケットに入っている「エチケット袋」は、
  航空会社ごとにデザインや形状が異なります。また、時期に応じても変化していきます。
  本サイトでは、管理人のエチケット袋コレクションを、記録・紹介しています。
</p>

  </section>

</main>

<!-- フッター -->

<footer class="text-center text-gray-500 text-sm mt-16 mb-8">
  © 2025 エチケット袋コレクション
</footer>

</body>
</html>
