<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>エチケット袋コレクション</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  
</head>

<!-- ヘッダー -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b shadow-sm">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center">
    <!-- ロゴ -->
    <a href="index.html" class="shrink-0">
      <img
        src="images/title.png"
        alt="TOKYO-BARFBAG.COM"
        class="w-48 md:w-64""
      >
    <a/>

    <!-- ナビゲーション -->
    <nav class="ml-10">
      <ul class="flex gap-8 text-gray-700 font-medium">
        <li>
          <a href="index.html"
             class="hover:text-blue-600 transition">
            HOME
          </a>
        </li>

        <li>
          <a href="collection.html"
             class="hover:text-blue-600 transition">
            コレクション一覧
          </a>
        </li>
      </ul>
    </nav>    
  </div>
</header>
 
  <main class="max-w-6xl mx-auto p-4">
    <!-- 🔍 検索バー -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
      <input
        type="text"
        id="searchInput"
        placeholder="航空会社・国・年代で検索..."
        class="w-full sm:w-1/2 p-2 border rounded-md shadow-sm focus:ring focus:ring-blue-200"
      />
    </div>

    <!--地域ナビ -->
    <div class="flex flex-wrap gap-2 justify-center mb-6">
      <a href="collection.html" class="px-3 py-1 border rounded bg-white">すべて</a>
      <a href="collection.html?region=Japan" class="px-3 py-1 border rounded bg-white">日本</a>
      <a href="collection.html?region=China" class="px-3 py-1 border rounded bg-white">中国</a>
      <a href="collection.html?region=East Asia" class="px-3 py-1 border rounded bg-white">東アジア</a>
      <a href="collection.html?region=South East Asia" class="px-3 py-1 border rounded bg-white">東南アジア</a>
      <a href="collection.html?region=South Asia,Middle East"
         class="px-3 py-1 border rounded bg-white">南/西アジア</a>
      <a href="collection.html?region=Africa" class="px-3 py-1 border rounded bg-white">アフリカ</a>
      <a href="collection.html?region=Oceania" class="px-3 py-1 border rounded bg-white">オセアニア</a>
      <a href="collection.html?region=Europe" class="px-3 py-1 border rounded bg-white">ヨーロッパ</a>
      <a href="collection.html?region=North America,South America"
         class="px-3 py-1 border rounded bg-white">南/北アメリカ</a>
    </div>

    <!-- 📄 ページネーション -->
    <div class="pagination flex flex-wrap justify-center mt-6 gap-2"></div>
    
    <a href="index.html" class="underline text-gray-500"> ← ホームへ戻る </a>
 
    <!-- 📦 カード一覧 -->
    <div id="bagContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
 
    <!-- 📄 ページネーション -->
    <div class="pagination flex flex-wrap justify-center mt-6 gap-2"></div>
  </main>
 
  <footer class="text-center text-gray-500 text-sm mt-10 mb-6">
    © 2025 エチケット袋コレクション
  </footer>
 
  <script src="collection.js"></script>
</body>
</html>
